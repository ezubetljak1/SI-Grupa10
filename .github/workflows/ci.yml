name: Docflow CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
    paths-ignore:
      - '**/*.md'
      - '**/*.pdf'
      - '**/*.docx'
      - 'Sprint*/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend build, tests and report
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Project/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run backend tests
        run: ./mvnw clean verify

      - name: Add backend test summary
        if: ${{ !cancelled() }}
        run: |
          python3 - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          reports = sorted(Path("target/surefire-reports").glob("TEST-*.xml"))
          summary_file = os.environ["GITHUB_STEP_SUMMARY"]

          if not reports:
              with open(summary_file, "a", encoding="utf-8") as summary:
                  summary.write("## Backend Test Report\n\n")
                  summary.write("⚠️ No Surefire XML reports were generated.\n")
              raise SystemExit(0)

          total_tests = 0
          total_failures = 0
          total_errors = 0
          total_skipped = 0
          total_time = 0.0

          for report in reports:
              root = ET.parse(report).getroot()

              total_tests += int(root.attrib.get("tests", 0))
              total_failures += int(root.attrib.get("failures", 0))
              total_errors += int(root.attrib.get("errors", 0))
              total_skipped += int(root.attrib.get("skipped", 0))
              total_time += float(root.attrib.get("time", 0))

          passed = total_tests - total_failures - total_errors - total_skipped
          successful = total_failures == 0 and total_errors == 0
          icon = "✅" if successful else "❌"

          with open(summary_file, "a", encoding="utf-8") as summary:
              summary.write("## Backend Test Report\n\n")
              summary.write("### Summary\n\n")
              summary.write(f"- Test Suites: **{len(reports)} total**\n")
              summary.write(
                  f"- Test Results: {icon} **{passed} passed** · "
                  f"**{total_tests} total**\n"
              )
              summary.write(f"- Failures: **{total_failures}**\n")
              summary.write(f"- Errors: **{total_errors}**\n")
              summary.write(f"- Skipped: **{total_skipped}**\n")
              summary.write(f"- Duration: **{total_time:.2f} s**\n\n")
              summary.write(
                  "Detailed Surefire results are available in the "
                  "`backend-test-reports` artifact.\n"
              )
          PY

      - name: Generate backend HTML test report
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: >
          ./mvnw
          org.apache.maven.plugins:maven-surefire-report-plugin:3.5.5:report-only

      - name: Upload backend test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            Project/backend/target/surefire-reports/
            Project/backend/target/reports/
          if-no-files-found: warn
          retention-days: 14

  frontend:
    name: Frontend unit tests and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Project/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Project/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test:ci

      - name: Build frontend
        run: npm run build

  frontend-ui-smoke:
    name: Frontend Playwright UI smoke tests
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 15

    defaults:
      run:
        working-directory: Project/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Project/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Run Playwright public UI smoke tests
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            Project/frontend/playwright-report/
            Project/frontend/test-results/
          if-no-files-found: warn
          retention-days: 14