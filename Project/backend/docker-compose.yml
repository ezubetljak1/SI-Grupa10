services:
  docflow-db:
    image: postgres:16
    container_name: docflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: docflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - docflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docflow"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  docflow_postgres_data: