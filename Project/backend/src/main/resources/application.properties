spring.application.name=docflow-backend
server.port=8080
spring.datasource.url=jdbc:postgresql://localhost:5432/docflow
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.messages.basename=messages
spring.messages.encoding=UTF-8
# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.resolve-lazily=true 
server.tomcat.max-swallow-size=-1
# Document storage configuration
# Local default: C:/docflow-uploads
# On server, set environment variable DOCFLOW_UPLOAD_DIR=/opt/docflow/uploads
docflow.storage.root-dir=${DOCFLOW_UPLOAD_DIR:C:/docflow-uploads}
docflow.storage.max-file-size=10485760
docflow.storage.allowed-extensions=pdf,jpg,jpeg,png
docflow.storage.allowed-content-types=application/pdf,image/jpeg,image/png