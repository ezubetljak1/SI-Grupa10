spring.application.name=docflow-backend
server.port=${SERVER_PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/docflow}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.messages.basename=messages
spring.messages.encoding=UTF-8
# Multipart upload limits
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}
spring.servlet.multipart.resolve-lazily=true
server.tomcat.max-swallow-size=-1
# Document storage configuration
# Local default: C:/docflow-uploads
# On server/container, set DOCFLOW_UPLOAD_DIR=/app/uploads
docflow.storage.root-dir=${DOCFLOW_UPLOAD_DIR:C:/docflow-uploads}
docflow.storage.max-file-size=${DOCFLOW_MAX_FILE_SIZE:10485760}
docflow.storage.allowed-extensions=pdf,jpg,jpeg,png
docflow.storage.allowed-content-types=application/pdf,image/jpeg,image/png