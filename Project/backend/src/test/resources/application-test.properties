spring.datasource.url=jdbc:h2:mem:docflow_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.resolve-lazily=true
server.tomcat.max-swallow-size=-1
docflow.storage.max-file-size=1024
docflow.storage.allowed-extensions=pdf,jpg,jpeg,png
docflow.storage.allowed-content-types=application/pdf,image/jpeg,image/png