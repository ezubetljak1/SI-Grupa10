# Local development Docker Compose file.
# This file starts only local infrastructure needed by the backend.
# Backend and frontend are run locally from the IDE / Angular CLI.
#
# Run from Project/backend:
# docker compose -f docker-compose.local.yml up -d

services:
  docflow-db:
    image: postgres:16
    container_name: docflow-local-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: docflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    # Exposes PostgreSQL to the host machine so the locally running backend
    # can connect using jdbc:postgresql://localhost:5432/docflow
    ports:
      - "5432:5432"

    volumes:
      - docflow_local_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d docflow" ]
      interval: 10s
      timeout: 5s
      retries: 10

  docflow-keycloak-db:
    image: postgres:16
    container_name: docflow-local-keycloak-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak

    volumes:
      - docflow_local_keycloak_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U keycloak -d keycloak" ]
      interval: 10s
      timeout: 5s
      retries: 10

  docflow-keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: docflow-local-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --spi-theme-static-max-age=-1
      - --spi-theme-cache-themes=false
      - --spi-theme-cache-templates=false

    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://docflow-local-keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"

      DOCFLOW_FRONTEND_URL: ${DOCFLOW_FRONTEND_URL:-http://localhost:4200}

    ports:
      - "8081:8080"

    # This path is relative to Project/backend.
    # It expects:
    # - Project/keycloak/import/docflow-realm.json
    # - Project/keycloak/themes/docflow/login/theme.properties
    volumes:
      - ../keycloak/import:/opt/keycloak/data/import
      - ../keycloak/themes:/opt/keycloak/themes

    depends_on:
      docflow-keycloak-db:
        condition: service_healthy

volumes:
  docflow_local_postgres_data:
  docflow_local_keycloak_postgres_data: