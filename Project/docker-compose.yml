services:
  docflow-db:
    image: postgres:16
    container_name: docflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docflow}
      POSTGRES_USER: ${POSTGRES_USER:-docflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - docflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docflow-network

  docflow-keycloak-db:
    image: postgres:16
    container_name: docflow-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - docflow_keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docflow-network

  docflow-keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: docflow-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --spi-theme-static-max-age=-1
      - --spi-theme-cache-themes=false
      - --spi-theme-cache-templates=false
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://docflow-keycloak-db:5432/${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      DOCFLOW_FRONTEND_URL: ${DOCFLOW_FRONTEND_URL:-http://localhost:4200}
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import
      - ./keycloak/themes:/opt/keycloak/themes
    depends_on:
      docflow-keycloak-db:
        condition: service_healthy
    networks:
      - docflow-network

  docflow-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docflow-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://docflow-db:5432/${POSTGRES_DB:-docflow}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-docflow_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      DOCFLOW_UPLOAD_DIR: /app/uploads
      DOCFLOW_MAX_FILE_SIZE: ${DOCFLOW_MAX_FILE_SIZE:-10485760}
      GOOGLE_CLOUD_PROJECT_ID: ${GOOGLE_CLOUD_PROJECT_ID}
      GOOGLE_DOCUMENT_AI_LOCATION: ${GOOGLE_DOCUMENT_AI_LOCATION:-eu}
      GOOGLE_DOCUMENT_AI_ENDPOINT: ${GOOGLE_DOCUMENT_AI_ENDPOINT:-eu-documentai.googleapis.com:443}

      GOOGLE_DOCUMENT_AI_CLASSIFIER_PROCESSOR_ID: ${GOOGLE_DOCUMENT_AI_CLASSIFIER_PROCESSOR_ID}
      GOOGLE_DOCUMENT_AI_INVOICE_PROCESSOR_ID: ${GOOGLE_DOCUMENT_AI_INVOICE_PROCESSOR_ID}
      GOOGLE_DOCUMENT_AI_RECEIPT_PROCESSOR_ID: ${GOOGLE_DOCUMENT_AI_RECEIPT_PROCESSOR_ID}
      GOOGLE_DOCUMENT_AI_BANK_STATEMENT_PROCESSOR_ID: ${GOOGLE_DOCUMENT_AI_BANK_STATEMENT_PROCESSOR_ID}
      GOOGLE_DOCUMENT_AI_FORM_PROCESSOR_ID: ${GOOGLE_DOCUMENT_AI_FORM_PROCESSOR_ID}

      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/google-document-ai.json
    volumes:
      - docflow_uploads:/app/uploads
      - ./secrets/google-document-ai.json:/app/secrets/google-document-ai.json:ro
    depends_on:
      docflow-db:
        condition: service_healthy
    networks:
      - docflow-network

  docflow-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docflow-frontend
    restart: unless-stopped
    environment:
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-20M}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - docflow-backend
    networks:
      - docflow-network

volumes:
  docflow_postgres_data:
  docflow_uploads:
  docflow_keycloak_postgres_data:

networks:
  docflow-network:
    driver: bridge