services:
  docflow-db:
    image: postgres:16
    container_name: docflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docflow}
      POSTGRES_USER: ${POSTGRES_USER:-docflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - docflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - docflow-network

  docflow-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docflow-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://docflow-db:5432/${POSTGRES_DB:-docflow}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-docflow_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      DOCFLOW_UPLOAD_DIR: /app/uploads
      DOCFLOW_MAX_FILE_SIZE: ${DOCFLOW_MAX_FILE_SIZE:-10485760}
    volumes:
      - docflow_uploads:/app/uploads
    depends_on:
      docflow-db:
        condition: service_healthy
    networks:
      - docflow-network

  docflow-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docflow-frontend
    restart: unless-stopped
    environment:
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-20M}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - docflow-backend
    networks:
      - docflow-network

volumes:
  docflow_postgres_data:
  docflow_uploads:

networks:
  docflow-network:
    driver: bridge