<div class="empty-state">
  <div class="empty-state__icon">
    {{ icon }}
  </div>

  @if (title) {
    <h2 class="empty-state__title">
      {{ title }}
    </h2>
  }

  @if (description) {
    <p class="empty-state__description">
      {{ description }}
    </p>
  }

  <div class="empty-state__actions">
    <ng-content select="[empty-actions]"></ng-content>
  </div>
</div>
