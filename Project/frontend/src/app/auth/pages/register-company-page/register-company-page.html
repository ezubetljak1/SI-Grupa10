<section class="register-page">
  <header class="page-intro">
    <div>
      <p class="eyebrow">Company access</p>
      <h1>Register company</h1>
      <span>Create a company workspace and the first administrator account.</span>
    </div>
  </header>

  @if (result) {
    <div class="success-banner" aria-live="polite">
      <span class="success-mark">✓</span>

      <div>
        <strong>{{ result.companyName }} registered successfully.</strong>
        <p>
          {{ result.message }}
        </p>
      </div>
    </div>
  }

  <form class="form-panel" (ngSubmit)="submit()" #companyForm="ngForm">
    <div class="panel-heading">
      <h2>Company details</h2>
      <span>These values are used to create the tenant and initial admin.</span>
    </div>

    <div class="form-grid">
      <div class="field">
        <label for="companyName">Company name</label>
        <input
          id="companyName"
          class="input"
          name="companyName"
          [(ngModel)]="form.companyName"
          required
        />
      </div>

      <div class="field">
        <label for="companyEmail">Company email</label>
        <input
          id="companyEmail"
          class="input"
          type="email"
          name="companyEmail"
          [(ngModel)]="form.companyEmail"
          required
        />
      </div>

      <div class="field field--wide">
        <label for="companyAddress">Company address</label>
        <input
          id="companyAddress"
          class="input"
          name="companyAddress"
          [(ngModel)]="form.companyAddress"
          required
        />
      </div>

      <div class="field">
        <label for="adminFirstName">Admin first name</label>
        <input
          id="adminFirstName"
          class="input"
          name="adminFirstName"
          [(ngModel)]="form.adminFirstName"
          required
        />
      </div>

      <div class="field">
        <label for="adminLastName">Admin last name</label>
        <input
          id="adminLastName"
          class="input"
          name="adminLastName"
          [(ngModel)]="form.adminLastName"
          required
        />
      </div>

      <div class="field field--wide">
        <label for="adminEmail">Admin email</label>
        <input
          id="adminEmail"
          class="input"
          type="email"
          name="adminEmail"
          [(ngModel)]="form.adminEmail"
          required
        />
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="submitting || companyForm.invalid">
        {{ submitting ? 'Registering...' : 'Register company' }}
      </button>
    </div>
  </form>
</section>
